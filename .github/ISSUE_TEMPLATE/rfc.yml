name: NightForge RFC
description: Propose a measurable change backed by evidence and a rollback plan.
title: "[RFC] "
labels: ["kind:rfc", "rfc:proposed"]
body:
  - type: markdown
    attributes:
      value: "RFCs must include reproducible evidence, measurable impact, bounded cost, and rollback."
  - type: input
    id: proposer
    attributes:
      label: Proposer node
      placeholder: node-a
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem and reproduction
      description: State the problem and exact reproduction steps.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: One URI and SHA-256 per line.
      placeholder: "https://example.test/log.txt | <64 hex characters>"
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected measurable impact
      placeholder: "test_pass_rate: +10\nlatency_ms: -20"
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope and required permissions
    validations:
      required: true
  - type: input
    id: budget
    attributes:
      label: Budget ceiling
      placeholder: "agent_minutes=60, max_cost_usd=2.00"
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Machine-testable acceptance criteria
    validations:
      required: true
  - type: textarea
    id: rollback
    attributes:
      label: Rollback plan
    validations:
      required: true
  - type: textarea
    id: conflicts
    attributes:
      label: Conflicts of interest
      description: State none when there are no known conflicts.
    validations:
      required: true
